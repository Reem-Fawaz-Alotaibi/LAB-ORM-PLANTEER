{% extends 'main/base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <span class="mini-tag">Welcome Back</span>
        <h1>Sign In</h1>
        <p>Login to manage your Planteer account.</p>

        <form class="auth-form" action="{% url 'accounts:sign_in' %}{% if 'next' in request.GET %}?next={{ request.GET.next }}{% endif %}" method="POST">
            {% csrf_token %}

            {% if errors.login %}
            <div class="error-box">
                {{ errors.login }}
            </div>
            {% endif %}

            <div class="auth-field">
                <label>Username</label>
                <input type="text" name="username" value="{{ username }}" placeholder="Enter your username" required>
            </div>


            <div class="auth-field">
                <label>Password</label>

                <div class="password-wrapper">
                    <input type="password" id="passwordInput" name="password" required>

                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="forgot-password">
                    <a href="{% url 'password_reset' %}">Forgot password?</a>
                </div>
            </div>

            <button class="primary-btn auth-btn" type="submit">Sign In</button>
        </form>
    </div>
</section>
{% endblock %}
