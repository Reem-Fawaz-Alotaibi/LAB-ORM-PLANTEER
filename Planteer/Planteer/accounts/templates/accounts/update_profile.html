{% extends 'main/base.html'%}
{% load static %}

{% block title %}Update {{ request.user.username }}{% endblock %}

{% block content %}

<section class="container section-space d-flex justify-content-center">

    <div class="update-card">

        <h2 class="text-center mb-4">Update Profile</h2>

        <form class="d-flex flex-column gap-3"
            action="{% url 'accounts:update_user_profile' %}"
            method="POST"
            enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-floating">
                <input type="email" class="form-control" name="email" required value="{{ request.user.email }}">
                <label>Email</label>
            </div>

            <div class="form-floating">
                <input type="text" class="form-control" name="first_name" required value="{{ request.user.first_name }}">
                <label>First Name</label>
            </div>

            <div class="form-floating">
                <input type="text" class="form-control" name="last_name" required value="{{ request.user.last_name }}">
                <label>Last Name</label>
            </div>

            <textarea class="form-control" name="about" placeholder="About you...">{{ request.user.profile.about }}</textarea>

            <div class="text-center">
                <h5>Current Avatar</h5>

                {% if request.user.profile.avatar %}
                <img src="{{ request.user.profile.avatar.url }}" class="avatar-preview mb-2">
                {% else %}
                <img src="{% static 'images/avatars/avatar.png' %}" class="avatar-preview mb-2">
                {% endif %}

                <input type="file" name="avatar" class="form-control">
            </div>

            <button class="btn btn-success w-100 mt-3">Update</button>

        </form>

    </div>

</section>

{% endblock %}
