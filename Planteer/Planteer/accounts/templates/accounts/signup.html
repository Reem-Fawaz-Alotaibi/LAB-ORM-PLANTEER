{% extends 'main/base.html' %}

{% block title %}Sign Up new user{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <span class="mini-tag">Join Planteer</span>
        <h1>Sign Up</h1>
        <p>Create an account and start your green journey.</p>

        <form class="auth-form" action="{% url 'accounts:sign_up' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="auth-field">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="auth-field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <div class="auth-row">
                <div class="auth-field">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="First name" required>
                </div>

                <div class="auth-field">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Last name" required>
                </div>
            </div>

            <textarea class="form-control" placeholder="About" name="about"></textarea>

            <h5>Choose Avatar:</h5>
            <input type="file" name="avatar" accept="images/*" class="form-control" />

            <div class="auth-field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>

            <button class="primary-btn auth-btn" type="submit">Sign Up</button>
        </form>
    </div>
</section>
{% endblock %}
