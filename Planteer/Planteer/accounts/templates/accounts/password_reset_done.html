{% extends 'main/base.html' %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <span class="mini-tag">Check Email</span>
        <h1>Email Sent</h1>
        <p>If an account exists with that email, a password reset link has been sent.</p>

        <a href="{% url 'accounts:sign_in' %}" class="primary-btn auth-btn">Back to Sign In</a>
    </div>
</section>
{% endblock %}
