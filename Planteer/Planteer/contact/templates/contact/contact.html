{% extends 'main/base.html' %}
{% block title %}Contact Us | Planteer{% endblock %}
{% block content %}
<section class="container section-space">
    <div class="contact-layout">
        <div class="contact-form-card">
            <span class="mini-tag">Contact</span>
            <h1>Contact Us</h1>
            <p>Send us your message and let us know what plants you love.</p>
            <form method="POST" class="site-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="primary-btn form-btn">Submit</button>
            </form>
        </div>
        <div class="contact-image-card">
            <img src="https://images.unsplash.com/photo-1463936575829-25148e1db1b8?auto=format&fit=crop&w=1200&q=80" alt="Plant contact">
        </div>
    </div>
</section>
{% endblock %}
